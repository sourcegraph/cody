name: Bundle Size Tracker

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  release:
    if: github.repository == 'sourcegraph/cody'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # for publishing the release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # SECURITY: pin third-party action hashes
      - run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash
        id: pnpm-cache
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm install
      # Run Biome and capture the output. If biome crashes, it still reports a
      # successful CI run (exit code 0) but that will ripple down to errors in
      # the Biome VS Code extension. This ensures that we don't accidentally
      # break Biome.
      - name: Biome
        run: |
          set +e
          output=$(pnpm exec biome ci --error-on-warnings . 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ]; then
            exit $status
          fi
          if echo "$output" | grep -q "Biome encountered an unexpected error"; then
            echo "Error string 'Biome encountered an unexpected error' detected in output."
            exit 1
          fi
        shell: bash
      - run: pnpm run build
      - run: pnpm -C vscode run build
      - name: Check bundle sizes
        run: |
          cd vscode
          pnpm ts-node ./scripts/measure-bundle-size.ts
          cd ..
          echo "Extension Bundle Size: $EXTENSION_BUNDLE_SIZE_MB MB"
          echo "Webview Bundle Size: $WEBVIEW_BUNDLE_SIZE_MB MB"
        env:
          GITHUB_ENV: $GITHUB_ENV
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          service_account_key: ${{ secrets.GCP_BQ_CREDENTIALS }}
          project_id: 'cody-core-dev'
          export_default_credentials: true

      - name: Insert data into BigQuery
        run: |
          # Write the service account key to a file
          echo '${{ secrets.GCP_BQ_CREDENTIALS }}' > gcloud-service-key.json
          
          # Activate the service account
          gcloud auth activate-service-account --key-file=gcloud-service-key.json
          
          # Now create the JSON and insert into BigQuery
          echo "{\"release_version\": \"1.0.0\", \"extension_bundle_size_mb\": $EXTENSION_BUNDLE_SIZE_MB, \"webview_bundle_size_mb\": $WEBVIEW_BUNDLE_SIZE_MB}" > data.json
          bq load \
            --project_id='cody-core-dev' \
            --source_format=NEWLINE_DELIMITED_JSON \
            cody_release.bundle_sizes \
            data.json
          
          # Clean up the service account key file
          rm gcloud-service-key.json
        env:
          EXTENSION_BUNDLE_SIZE_MB: ${{ env.EXTENSION_BUNDLE_SIZE_MB }}
          WEBVIEW_BUNDLE_SIZE_MB: ${{ env.WEBVIEW_BUNDLE_SIZE_MB }}